<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accuracy Sampled — VQAv2 · A-OKVQA · Seed Bench</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fa;
    --surface: #ffffff;
    --border: #e2e6ef;
    --text: #1a1d27;
    --muted: #7a8099;
    --accent: #b06a00;

    --c1: #3a7ec8;   /* Uniform Sampling */
    --c2: #2e9e5e;   /* Static Foveated */
    --c3: #d4621a;   /* Sunflower Inspired */
    --c4: #a83d91;   /* Radial Sampling */
    --c5: #b06a00;   /* LLMind (Ours) */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    padding: 48px 32px;
    min-height: 100vh;
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    letter-spacing: 0.06em;
    color: var(--accent);
    line-height: 1;
  }

  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.9rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px 28px;
    justify-content: center;
    margin-bottom: 52px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* Dataset sections */
  .dataset-section {
    margin-bottom: 64px;
  }
  .dataset-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    border-left: 4px solid var(--accent);
    padding-left: 14px;
    margin-bottom: 28px;
  }

  /* Grid of charts per dataset */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 24px;
  }

  /* Single chart card */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 24px 20px;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chart-title {
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .chart-model {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .chart-fullres {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 20px;
  }

  /* Bar chart */
  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Group = one sampling method (5 bars for 1%,3%,5% but we have 3 cols × 5 methods) */
  /* We do: rows = methods, columns = 1%, 3%, 5% */

  .col-headers {
    display: grid;
    grid-template-columns: 160px repeat(3, 1fr);
    margin-bottom: 6px;
  }
  .col-header {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.04em;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 160px repeat(3, 1fr);
    align-items: center;
    gap: 4px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .bar-row:last-child { border-bottom: none; }

  .bar-row.ours .method-name { color: var(--accent); font-weight: 600; }

  .method-name {
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    padding-right: 8px;
    line-height: 1.2;
  }

  .bar-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 3px 0;
  }

  .bar-fill {
    height: 12px;
    border-radius: 3px;
    min-width: 2px;
    width: 100%;
  }

  .bar-value {
    font-size: 0.62rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
    text-align: center;
    line-height: 1;
  }
  .bar-row.ours .bar-value { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Accuracy Sampled (%)</h1>
  <p>VQAv2 · A-OKVQA · Seed Bench &nbsp;|&nbsp; Sampling at 1%, 3%, 5%</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--c1)"></div>Uniform Sampling</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c2)"></div>Static Foveated</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c3)"></div>Sunflower Inspired</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c4)"></div>Radial Sampling</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c5)"></div>LLMind (Ours)</div>
</div>

<div id="root"></div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
// Structure: datasets[dataset][model] = { fullRes, methods: [[1%,3%,5%], ...] }
// Methods order: Uniform, StaticFoveated, Sunflower, Radial, LLMind

const data = {
  "VQAv2": {
    "Qwen2.5-VL": {
      fullRes: 86.96,
      methods: [
        [47.31, 52.71, 59.94],
        [46.18, 51.96, 58.30],
        [43.77, 47.41, 52.85],
        [44.79, 46.25, 50.12],
        [55.05, 65.37, 73.54],
      ]
    },
    "SmolVLM": {
      fullRes: 80.01,
      methods: [
        [46.38, 53.28, 59.06],
        [44.24, 51.64, 58.43],
        [46.45, 50.55, 55.48],
        [42.99, 47.07, 50.92],
        [58.88, 70.40, 76.46],
      ]
    },
    "LLaVA-OneVision": {
      fullRes: 73.34,
      methods: [
        [40.98, 49.15, 57.60],
        [42.27, 42.88, 45.37],
        [42.29, 46.02, 50.51],
        [40.10, 42.40, 45.25],
        [47.00, 54.49, 62.38],
      ]
    },
  },
  "A-OKVQA": {
    "Qwen2.5-VL": {
      fullRes: 85.67,
      methods: [
        [44.31, 48.77, 52.01],
        [45.58, 50.65, 56.78],
        [43.23, 46.28, 51.61],
        [45.58, 47.16, 48.90],
        [51.18, 61.53, 69.74],
      ]
    },
    "SmolVLM": {
      fullRes: 78.60,
      methods: [
        [39.78, 45.06, 48.73],
        [42.09, 46.98, 51.44],
        [42.44, 46.28, 48.64],
        [41.48, 43.58, 47.33],
        [64.81, 72.63, 76.81],
      ]
    },
    "LLaVA-OneVision": {
      fullRes: 60.26,
      methods: [
        [34.80, 35.71, 42.33],
        [33.25, 35.28, 37.27],
        [27.68, 30.91, 36.24],
        [28.29, 28.03, 29.78],
        [43.01, 46.09, 53.18],
      ]
    },
  },
  "Seed Bench": {
    "Qwen2.5-VL": {
      fullRes: 71.25,
      methods: [
        [35.53, 41.55, 48.45],
        [34.75, 42.05, 49.4],
        [36.70, 40.55, 44.6],
        [35.20, 39.45, 41.75],
        [40.28, 50.50, 58.23],
      ]
    },
    "SmolVLM": {
      fullRes: 51.6,
      methods: [
        [21.81, 26.38, 29.19],
        [30.20, 36.85, 42.65],
        [33.60, 34.95, 37.85],
        [30.80, 33.15, 36.05],
        [37.42, 43.44, 45.97],
      ]
    },
    "LLaVA-OneVision": {
      fullRes: 37.75,
      methods: [
        [18.63, 21.60, 24.35],
        [24.85, 23.55, 25.60],
        [21.40, 23.90, 25.15],
        [22.90, 21.70, 22.55],
        [26.05, 27.85, 30.40],
      ]
    },
  }
};

const methodNames = [
  "Uniform Sampling",
  "Static Foveated",
  "Sunflower Inspired",
  "Radial Sampling",
  "LLMind (Ours)",
];

const colors = ["var(--c1)", "var(--c2)", "var(--c3)", "var(--c4)", "var(--c5)"];

// ── RENDER ──────────────────────────────────────────────────────────────────
function buildChart(dataset, model, info) {
  // find global max for this chart for scaling
  const maxVal = 100;

  let rowsHTML = info.methods.map((vals, mi) => {
    const isOurs = mi === 4;
    const cells = vals.map(v => {
      const pct = (v / maxVal * 100).toFixed(1);
      return `
        <div class="bar-cell">
          <div style="width:100%;background:var(--border);border-radius:3px;height:12px;overflow:hidden;">
            <div class="bar-fill" style="width:${pct}%;background:${colors[mi]}"></div>
          </div>
          <div class="bar-value">${v.toFixed(2)}</div>
        </div>`;
    }).join('');
    return `
      <div class="bar-row${isOurs ? ' ours' : ''}">
        <div class="method-name">${methodNames[mi]}</div>
        ${cells}
      </div>`;
  }).join('');

  return `
    <div class="chart-card">
      <div class="chart-title">${dataset}</div>
      <div class="chart-model">${model}</div>
      <div class="chart-fullres">Full Res Accuracy: ${info.fullRes}%</div>
      <div class="bar-chart">
        <div class="col-headers">
          <div></div>
          <div class="col-header">1%</div>
          <div class="col-header">3%</div>
          <div class="col-header">5%</div>
        </div>
        ${rowsHTML}
      </div>
    </div>`;
}

const root = document.getElementById('root');
let delay = 0;

Object.entries(data).forEach(([dataset, models]) => {
  const section = document.createElement('div');
  section.className = 'dataset-section';
  section.innerHTML = `<div class="dataset-label">${dataset}</div><div class="charts-grid" id="grid-${dataset}"></div>`;
  root.appendChild(section);

  const grid = section.querySelector('.charts-grid');
  Object.entries(models).forEach(([model, info]) => {
    const div = document.createElement('div');
    div.innerHTML = buildChart(dataset, model, info);
    const card = div.firstElementChild;
    card.style.animationDelay = `${delay}ms`;
    delay += 80;
    grid.appendChild(card);
  });
});
</script>
</body>
</html>
